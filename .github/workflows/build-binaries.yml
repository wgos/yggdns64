name: Build Release

on:
  push:

env:
  GO_BIN_NAME: yggdns64

jobs:
  build:
    name: Build for ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64, arm64]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          OUTPUT_PATH=dist/${{ env.GO_BIN_NAME }}\
          -$(git describe --tags --always)\
          -${{ env.GOOS }}\
          -${{ env.GOARCH }}\
          ${{ env.GOOS == 'windows' && '.exe' || '' }}
          
          go build \
            -o "${OUTPUT_PATH}" \
            ./cmd/yggdns64

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.GO_BIN_NAME }}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          path: dist/
          retention-days: 1

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: dist/*
